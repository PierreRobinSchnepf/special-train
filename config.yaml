# Single pipeline configuration. No parameter may be hard-coded elsewhere in
# the code: every coefficient, threshold or date window lives here.

# ---------------------------------------------------------------------------
# Time window of the final dataset
# ---------------------------------------------------------------------------
date_range:
  start: "2018-01-01T00:00:00Z"   # lower bound required by the source report
  end: null                        # null = up to the latest available data

# ---------------------------------------------------------------------------
# Timezone convention
# ---------------------------------------------------------------------------
# Master dataset index: continuous hourly UTC (no DST duplicates/gaps).
# - y (gas, ODRÉ)      : `date_heure` is already UTC (verified: 23:30 Paris
#   local time <-> 21:30Z in summer, +2h offset = CEST). No conversion.
# - T (SYNOP Météo-France): `AAAAMMJJHH` is UTC (standard SYNOP convention).
#   No conversion.
# - Calendar variables (weekday, day of year for Fourier, public holidays,
#   school holidays, end-of-year window) depend on the FRENCH CIVIL calendar,
#   so they are derived from the timestamp converted to Europe/Paris (only to
#   extract the local date), then reattached to the UTC index. This avoids
#   misclassifying the 22:00–23:59 UTC hours (which already belong to the
#   next civil day in Paris).
timezone:
  master_index: "UTC"
  calendar_reference: "Europe/Paris"

# ---------------------------------------------------------------------------
# Source 1: hourly gas consumption (y)
# ---------------------------------------------------------------------------
gas:
  dataset_id: "consommation-quotidienne-brute"
  # v2 "exports/csv" endpoint: no offset+limit<=10000 cap (unlike /records,
  # which caps at 10k cumulative rows) and no ~4 MB truncation (unlike the v1
  # /api/records/1.0/download/ endpoint). Verified empirically on 2026-07-16.
  # Chunked by civil year to stay under response-size limits and allow an
  # incremental cache.
  base_url: "https://odre.opendatasoft.com/api/v2/catalog/datasets/consommation-quotidienne-brute/exports/csv"
  # Field observed as of 2026-07-16 (the "gaz_grtgaz" field mentioned in the
  # initial spec no longer exists: the schema evolved to an aggregated
  # GRTgaz+Terega field). Check the catalog/datasets endpoint if the fetch
  # fails.
  value_field: "consommation_brute_gaz_totale"
  datetime_field: "date_heure"
  unit: "MW PCS 0°C"
  perimeter: "Continental France (GRTgaz + Terega networks)"

# ---------------------------------------------------------------------------
# Source 1bis: REGIONAL gas consumption (target of the per-region model)
# ---------------------------------------------------------------------------
# The national `consommation-quotidienne-brute` dataset (above) has no
# regional breakdown. Per-region consumption is reconstructed by summing two
# regional ODRÉ datasets (same pair as pipeline/gas_freshness.py, but here
# the regional granularity is KEPT instead of summing country-wide):
#   - industrial   : `conso-journa-industriel-grtgazterega`      (2018-01-01 ->)
#   - distribution : `courbe-de-charge-eldgrd-regional-grtgaz-terega` (2018-06-01 ->)
# Verified empirically on 2026-07-17: both cover the same 12 metropolitan
# regions connected to the grid (all but Corsica, not connected to natural
# gas), 2 operators (NaTran ex-GRTgaz + Teréga), several sectors.
# WIDE format (one column per hour), LOCAL Europe/Paris time (not UTC) —
# conversion mandatory, see src/regional_gas.py. Publication lag ~15-20 days
# (vs ~45-50 days for the national aggregate).
gas_regional:
  industrial_dataset_id: "conso-journa-industriel-grtgazterega"
  distribution_dataset_id: "courbe-de-charge-eldgrd-regional-grtgaz-terega"
  export_url_template: "https://odre.opendatasoft.com/api/v2/catalog/datasets/{dataset_id}/exports/csv"
  date_field: "date"
  region_code_field: "code_region"
  # The industrial field starts in January 2018, distribution in June 2018;
  # a region only has a complete total (industrial + distribution) from the
  # later of the two. Documented here rather than hard-coded.
  distribution_start: "2018-06-01"
  # Start of the RELIABLE native hourly history. Empirical finding
  # (2026-07-18, see src/regional_gas.py): before June 2023 the intraday
  # profile of the regional data is phase-shifted (~+6h on distribution;
  # peak at 12h UTC in 2018-2022 vs 06h UTC in 2024+), corrupting the hourly
  # shape — while daily totals stay correct. Clean convention switch at
  # 2023-06: Σregions vs national goes from ~11-19% (before) to 0.01-0.5%
  # (after) median hourly gap. HOURLY regional models therefore only train
  # from this date on (user decision: no attempt to fix pre-2023).
  hourly_valid_start: "2023-06-01"
  # "Isolated dip" cleaning: the source encodes a recurring artefact on the
  # Saturday 01:00 UTC preceding the March DST switch (values 0 to ~100 MW
  # while the region runs at thousands of MW). A plain magnitude threshold is
  # dangerous (Occitanie's true summer minimum ~104 MW grazes the ~100 MW
  # anomaly); the filter therefore targets the ISOLATED nature: any hour <
  # dip_fraction x min(neighbors) is an impossible one-hour collapse (thermal
  # inertia) -> NaN. Huge margin: anomalies ~6% of neighbors, true troughs
  # ~90%.
  dip_fraction: 0.5
  raw_subdir: "gas_regional"
  # The distribution dataset exports large yearly CSVs (several MB, slow ODRÉ
  # server) that exceed the default 60s HTTP timeout -> dedicated timeout.
  request_timeout: 300
  # INSEE code -> canonical name mapping (raw CSV names vary:
  # "Grand-Est"/"Grand Est", "Ile-de-France"/"Île-de-France"...).
  # Always keyed on the numeric, stable code_region, never the raw label.
  regions:
    11: "Île-de-France"
    24: "Centre-Val de Loire"
    27: "Bourgogne-Franche-Comté"
    28: "Normandie"
    32: "Hauts-de-France"
    44: "Grand Est"
    52: "Pays de la Loire"
    53: "Bretagne"
    75: "Nouvelle-Aquitaine"
    76: "Occitanie"
    84: "Auvergne-Rhône-Alpes"
    93: "Provence-Alpes-Côte d'Azur"

# ---------------------------------------------------------------------------
# Source 2: hourly temperature (Météo-France, base hourly climatological
# data, per-department files)
# ---------------------------------------------------------------------------
meteo:
  datagouv_dataset_id: "6569b4473bedf2e7abad3b72"  # "Données climatologiques de base - horaires"
  # Station basket: one "representative" department per major climatic/
  # demographic zone of continental France. Each department file contains
  # several stations (NUM_POSTE); the station kept per department is chosen
  # AUTOMATICALLY at run time as the one with the best non-null coverage of
  # the T column over the period — this choice is logged to
  # data/raw/meteo/station_selection.json for audit, rather than silently
  # guessed.
  #
  # Weighting: demographic proxy (department population, INSEE ~2021 order of
  # magnitude, NOT an official GRTgaz zoning — the latter is not published as
  # open data). Documented explicitly rather than assumed: see
  # docs/data-dictionary.md § National temperature.
  #
  # `region_code` (INSEE) attaches each department to its administrative
  # region, to build a PER-REGION temperature (population-weighted average of
  # the region's stations) in addition to the national one. The 12 gas
  # regions (see gas_regional) are all covered by >= 1 station. Added on
  # 2026-07-18: dept 45 (Loiret / Orléans) — the original national basket had
  # no station in Centre-Val de Loire (24); the regional prefecture is used.
  # The national temperature is unchanged (national weights do not depend on
  # region_code), only dept 45 joins it marginally.
  stations:
    - department: "75"
      region_code: 11
      region_label: "Paris / Île-de-France"
      weight: 2133000
    - department: "45"
      region_code: 24
      region_label: "Loiret (Orléans) — Centre-Val de Loire"
      weight: 680000
    - department: "59"
      region_code: 32
      region_label: "Nord (Lille)"
      weight: 2604000
    - department: "69"
      region_code: 84
      region_label: "Rhône (Lyon)"
      weight: 1876000
    - department: "13"
      region_code: 93
      region_label: "Bouches-du-Rhône (Marseille)"
      weight: 2043000
    - department: "31"
      region_code: 76
      region_label: "Haute-Garonne (Toulouse)"
      weight: 1400000
    - department: "33"
      region_code: 75
      region_label: "Gironde (Bordeaux)"
      weight: 1633000
    - department: "44"
      region_code: 52
      region_label: "Loire-Atlantique (Nantes)"
      weight: 1442000
    - department: "67"
      region_code: 44
      region_label: "Bas-Rhin (Strasbourg)"
      weight: 1132000
    - department: "35"
      region_code: 53
      region_label: "Ille-et-Vilaine (Rennes)"
      weight: 1088000
    - department: "38"
      region_code: 84
      region_label: "Isère (Grenoble)"
      weight: 1271000
    - department: "76"
      region_code: 28
      region_label: "Seine-Maritime (Rouen)"
      weight: 1255000
    - department: "06"
      region_code: 93
      region_label: "Alpes-Maritimes (Nice)"
      weight: 1094000
    - department: "21"
      region_code: 27
      region_label: "Côte-d'Or (Dijon)"
      weight: 532000
    - department: "63"
      region_code: 84
      region_label: "Puy-de-Dôme (Clermont-Ferrand)"
      weight: 662000
    - department: "51"
      region_code: 44
      region_label: "Marne (Reims)"
      weight: 566000
  min_period_start_year: 2010  # only download decennial archives >= this year
  value_field: "T"             # °C, already in real units (no /10 to apply)
  station_id_field: "NUM_POSTE"
  datetime_field: "AAAAMMJJHH"
  datetime_format: "%Y%m%d%H"
  # Short-gap filling before the EWMA smoothing (sensor offline for a few
  # hours). Beyond this, the value stays NaN and is logged in QC.
  max_ffill_gap_hours: 3

# ---------------------------------------------------------------------------
# Source 3: public holidays
# ---------------------------------------------------------------------------
holidays:
  url: "https://etalab.github.io/jours-feries-france-data/csv/jours_feries_metropole.csv"

# ---------------------------------------------------------------------------
# Source 4: school holidays (zones A/B/C)
# ---------------------------------------------------------------------------
school_holidays:
  api_url: "https://data.education.gouv.fr/api/records/1.0/search/"
  dataset_id: "fr-en-calendrier-scolaire"
  page_size: 2000
  zones_metropole: ["Zone A", "Zone B", "Zone C"]

# ---------------------------------------------------------------------------
# Thermal block (Table 1)
# ---------------------------------------------------------------------------
thermal:
  t_base_celsius: 15.0   # base threshold for X1_heating and X2_smo_heating
  kappa: 0.98             # T_smo_t = kappa*T_smo_{t-1} + (1-kappa)*T_t (Dordonnat et al.)
  init_method: "first_observation"  # T_smo_0 = T_0; documented alternative: "first_week_mean"

# ---------------------------------------------------------------------------
# Seasonal block (Fourier)
# ---------------------------------------------------------------------------
fourier:
  harmonics: [1, 2, 3, 4]
  days_in_year: 365.25

# ---------------------------------------------------------------------------
# Calendar block
# ---------------------------------------------------------------------------
calendar:
  end_of_year_window: { start_month: 12, start_day: 24, end_month: 12, end_day: 31 }
  # FLAGGED AMBIGUITY (see spec): the source report mentions a possible
  # mid-August dip without listing it in Table 1. NOT implemented here — no
  # is_mid_august column. To be confirmed with the report's author first.
  mid_august_dip: null
  # FLAGGED AMBIGUITY: is_off_peak_period has no single operational
  # definition in the source report ("school holidays, public holidays and
  # end-of-year break"). Definition PROPOSED and documented here rather than
  # assumed:
  #   is_off_peak_period = 1 if (metropolitan public holiday)
  #                          OR (at least one school zone A/B/C on break)
  #                          OR (is_end_of_year == 1)
  # Deliberate overlap with is_end_of_year (the report already groups them on
  # the same Table 1 row): both columns are kept separate so the model can
  # estimate a differential effect.
  off_peak_definition: "holiday OR any_school_zone_on_break OR end_of_year"

# ---------------------------------------------------------------------------
# REGIONAL models (Step C: one model set per region)
# ---------------------------------------------------------------------------
# Train/test windows specific to the regional models. Different from the
# national ones (constants in models/persistence.py) because the reliable
# regional hourly history only starts at gas_regional.hourly_valid_start:
# ~3 winters only.
regional_models:
  # Every regional model starts at the beginning of the clean history (no
  # 2018/2020 offset as in the national case — nothing usable before).
  train_start: "2023-06-01"
  # Hold-out = last complete year (2025-26 heating season included). Train =
  # [train_start, test_start) = 2023-06 -> 2025-07 (~2 winters: 23-24, 24-25).
  test_start: "2025-07-01"
  test_end: "2026-07-01"
  # OLS deliberately EXCLUDED (judged to add no value over SURE). Only the
  # SURE (static) and the Kalman-SUR (dynamic adjustment) are trained.
  models: ["sure", "kalman"]
  artifacts_subdir: "regional"        # -> data/models/regional/region_<code>_<model>.pkl
  dataset_subdir: "regional"           # <- data/processed/regional/dataset_region_<code>.parquet

output:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  parquet_path: "data/processed/dataset_final.parquet"
  data_dictionary_path: "docs/data-dictionary.md"
